<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SEAFI 2026 — Dashboard Ejecutivo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --guinda:#7B1D2E;--guinda-d:#5A1020;--guinda-l:#F5EAEC;
    --azul:#1A5276;--azul-l:#EBF5FB;
    --verde:#1D6A4A;--verde-l:#E8F8F5;
    --naranja:#E67E22;--naranja-l:#FEF9E7;
    --morado:#6C3483;--morado-l:#F5EEF8;
    --cafe:#9B4D1F;--cafe-l:#FDF2E9;
    --rojo:#C0392B;--rojo-l:#FDEDEC;
    --gris-bg:#F4F5F7;--gris-ln:#E8E8E8;--gris-txt:#555;
    --blanco:#fff;--sidebar-w:230px;--header-h:58px;
  }
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gris-bg);color:#333;display:flex;height:100vh;overflow:hidden}
  #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#1C1C2E;display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
  #sidebar.collapsed{width:52px;min-width:52px}
  .sb-logo{padding:14px 12px;border-bottom:1px solid #ffffff12;display:flex;align-items:center;gap:9px}
  .sb-icon{width:30px;height:30px;border-radius:7px;background:var(--guinda);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .sb-text{overflow:hidden}
  .sb-title{color:#fff;font-weight:800;font-size:12px;line-height:1}
  .sb-sub{color:#ffffff50;font-size:9px}
  .sb-toggle{margin-left:auto;background:none;border:none;color:#ffffff40;cursor:pointer;font-size:13px;flex-shrink:0;padding:4px}
  nav{flex:1;overflow-y:auto;padding:8px 0}
  .nav-btn{width:100%;padding:9px 12px;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;transition:all .15s;text-align:left}
  .nav-btn:hover{background:#ffffff08}
  .nav-btn.active{background:var(--guinda);border-left-color:#D4956A}
  .nav-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
  .nav-label{font-size:11px;color:#ffffff70;font-weight:400;line-height:1.2;white-space:nowrap;overflow:hidden}
  .nav-btn.active .nav-label{color:#fff;font-weight:700}
  .sb-footer{padding:10px 12px;border-top:1px solid #ffffff10;font-size:9px;color:#ffffff30}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #header{background:#fff;border-bottom:1px solid var(--gris-ln);padding:0 22px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px #0000000A;flex-shrink:0}
  .hdr-left .hdr-supra{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:1px}
  .hdr-left .hdr-title{font-size:17px;font-weight:800;color:#1C1C2E}
  .hdr-right{display:flex;align-items:center;gap:10px}
  .hdr-sync{background:var(--azul-l);border:1px solid #2471A330;border-radius:7px;padding:5px 12px;font-size:11px;color:var(--azul);cursor:pointer;font-weight:700;font-family:inherit}
  .hdr-date{background:var(--guinda-l);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--guinda);font-weight:700}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#27AE60;display:inline-block;margin-right:4px}
  .sync-dot.off{background:#E67E22}
  .sync-dot.err{background:#C0392B}
  .progress-bar-wrap{background:#F0F0F0;border-radius:99px;height:5px;overflow:hidden;width:70px}
  .progress-bar-fill{height:100%;border-radius:99px;transition:width .5s}
  #content{flex:1;overflow-y:auto;padding:22px}
  .kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .kpi{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 6px #0000000D;flex:1;min-width:120px;border-left:4px solid var(--guinda)}
  .kpi-label{font-size:9px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .kpi-value{font-size:24px;font-weight:800;line-height:1}
  .kpi-sub{font-size:10px;color:#aaa;margin-top:2px}
  .sec-title{font-size:11px;font-weight:700;color:var(--guinda);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;border-bottom:2px solid var(--guinda-l);padding-bottom:7px}
  .card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 6px #0000000D;margin-bottom:14px}
  .card-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{padding:10px 13px;text-align:left;font-weight:600;font-size:10px;background:var(--guinda);color:#fff;white-space:nowrap}
  .tbl td{padding:9px 13px;border-bottom:1px solid #F5F5F5;color:var(--gris-txt);vertical-align:middle}
  .tbl tr:nth-child(even) td{background:#FAFAFA}
  .tbl tr:hover td{background:var(--guinda-l)}
  .tbl-azul th{background:var(--azul)}
  .tbl-verde th{background:var(--verde)}
  .tbl-morado th{background:var(--morado)}
  .tbl-cafe th{background:var(--cafe)}
  .tbl-rojo th{background:var(--rojo)}
  .pb{background:#F0F0F0;border-radius:99px;height:7px;overflow:hidden;margin:3px 0}
  .pb-fill{height:100%;border-radius:99px;background:var(--guinda);transition:width .5s}
  .modal-overlay{position:fixed;inset:0;background:#00000060;z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px #00000030}
  .modal-header{padding:16px 22px;border-bottom:1px solid #F0F0F0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
  .modal-header h3{font-size:15px;font-weight:800;color:#333}
  .modal-close{background:none;border:none;font-size:20px;color:#bbb;cursor:pointer;padding:0 4px}
  .modal-body{padding:20px 22px}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:10px;font-weight:700;color:#888;margin-bottom:4px}
  .fld label .req{color:var(--rojo);margin-left:3px}
  .fld input,.fld select,.fld textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #E0E0E0;font-size:12px;color:#333;font-family:inherit;background:#fff;outline:none}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--guinda)}
  .fld textarea{resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;transition:opacity .15s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--guinda);color:#fff}
  .btn-primary:hover:not(:disabled){background:var(--guinda-d)}
  .btn-secondary{background:#F0F0F0;color:#555}
  .btn-sm{padding:5px 12px;font-size:11px}
  .btn-icon{background:none;border:1px solid #E0E0E0;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:11px;color:#666}
  .alert{border-radius:8px;padding:11px 15px;margin-bottom:14px;font-size:12px;display:flex;gap:10px;align-items:flex-start}
  .alert-info{background:var(--azul-l);border:1px solid #2471A330;color:var(--azul)}
  .alert-warn{background:var(--naranja-l);border:1px solid #E67E2240;color:#7E5109}
  .alert-danger{background:var(--rojo-l);border:1px solid #C0392B40;color:var(--rojo)}
  .alert-success{background:var(--verde-l);border:1px solid #1D6A4A40;color:var(--verde)}
  .comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:16px}
  .comp-card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 1px 6px #0000000D;cursor:pointer;border-left:4px solid;transition:box-shadow .2s}
  .comp-card:hover{box-shadow:0 3px 14px #0000001A}
  .comp-card.sel{box-shadow:0 0 0 2px var(--accent,var(--guinda))}
  .comp-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .comp-name{font-size:13px;font-weight:700;color:#333;margin-bottom:9px;line-height:1.3}
  .tl{border-left:2px solid #E0E0E0;padding-left:20px}
  .tl-item{position:relative;margin-bottom:14px}
  .tl-dot{position:absolute;left:-26px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--guinda);border:2px solid #fff;box-shadow:0 0 0 2px var(--guinda-l)}
  .tl-box{background:#F8F9FA;border-radius:8px;padding:10px 13px}
  .tl-head{display:flex;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px}
  .tl-type{font-size:11px;font-weight:700;color:var(--guinda)}
  .tl-date{font-size:10px;color:#aaa}
  .tl-text{font-size:12px;color:#444;margin-bottom:5px}
  .tl-acuerdo{font-size:11px;color:var(--verde);background:var(--verde-l);padding:3px 8px;border-radius:4px;margin-bottom:5px}
  .tl-tags{display:flex;gap:6px;flex-wrap:wrap}
  .tl-link{font-size:10px;color:var(--azul);margin-top:4px;display:block}
  .matrix{display:grid;grid-template-columns:72px repeat(5,1fr);gap:3px}
  .matrix-cell{height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .matrix-label{font-size:9px;color:#aaa;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
  .matrix-top-label{font-size:9px;color:#aaa;text-align:center;padding:2px 1px}
  .doc-link{color:var(--azul);font-size:11px;text-decoration:none}
  .doc-link:hover{text-decoration:underline}
  .brief-box{background:#F8F9FA;border-radius:10px;padding:18px;font-size:13px;color:#333;line-height:1.8;white-space:pre-wrap;min-height:120px}
  #kg-svg{width:100%;height:340px;background:#F8F9FA;border-radius:10px}
  .empty{text-align:center;padding:30px 0;color:#bbb;font-size:13px}
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .kanban-col{background:#F8F9FA;border-radius:8px;padding:10px}
  .kanban-title{font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;margin-bottom:8px;letter-spacing:.5px}
  .kanban-item{background:#fff;border-radius:6px;padding:8px;font-size:11px;color:#555;margin-bottom:6px;box-shadow:0 1px 3px #0000000D}
  .vigencia-labels{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:5px}
  #toast{position:fixed;bottom:24px;right:24px;background:#1C1C2E;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
  #toast.show{transform:translateY(0);opacity:1}
  #toast.success{background:var(--verde)}
  #toast.error{background:var(--rojo)}
  #toast.warn{background:var(--naranja)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#F0F0F0}
  ::-webkit-scrollbar-thumb{background:#CCC;border-radius:99px}
  .detail-panel{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 6px #0000000D;margin-top:12px;border-top:3px solid var(--guinda)}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
  .detail-field{background:#F8F9FA;border-radius:6px;padding:8px 10px}
  .detail-field .df-label{font-size:9px;color:#aaa;margin-bottom:3px}
  .detail-field .df-value{font-size:12px;color:#333;font-weight:600}
  .code-block{background:#1C1C2E;border-radius:8px;padding:16px;font-family:'Courier New',monospace;font-size:11px;color:#7FFF8A;line-height:1.7;overflow-x:auto;white-space:pre}
  .cfg-field{margin-bottom:14px}
  .cfg-field label{display:block;font-size:10px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .cfg-field input{width:100%;padding:9px 12px;border-radius:7px;border:1px solid #E0E0E0;font-size:12px;font-family:'Courier New',monospace;color:#333;outline:none}
  .cfg-field input:focus{border-color:var(--guinda)}
  .cfg-field input.ok{border-color:#27AE60;background:#E8F8F5}
  .cfg-field input.err{border-color:#C0392B;background:#FDEDEC}
  @media(max-width:700px){
    :root{--sidebar-w:52px}
    #sidebar{width:52px!important;min-width:52px!important}
    .nav-label,.sb-text,.sb-footer{display:none}
    .grid2{grid-template-columns:1fr}
    .kanban{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-icon">🏛</div>
    <div class="sb-text">
      <div class="sb-title">SEAFI 2026</div>
      <div class="sb-sub">Dashboard Ejecutivo</div>
    </div>
    <button class="sb-toggle" onclick="toggleSidebar()">◀</button>
  </div>
  <nav id="nav"></nav>
  <div class="sb-footer" id="sb-footer">v3.0 · Jun 2026</div>
</div>
<div id="main">
  <div id="header">
    <div class="hdr-left">
      <div class="hdr-supra">SEAFI · Consultoría Estratégica 2026</div>
      <div class="hdr-title" id="hdr-title">🏛 Resumen Ejecutivo</div>
    </div>
    <div class="hdr-right">
      <div id="sync-status" style="display:flex;align-items:center;gap:5px;font-size:11px;color:#888">
        <span class="sync-dot off" id="sync-dot"></span>
        <span id="sync-label">Sin Sheet</span>
      </div>
      <div>
        <div style="font-size:9px;color:#bbb">Tiempo consumido</div>
        <div style="font-size:12px;font-weight:700;color:var(--guinda)" id="hdr-pct"></div>

    </div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>
<input type="file" id="file-import" accept=".json" style="display:none" onchange="loadImport(event)"/>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// ▶ CONFIGURACIÓN GOOGLE SHEETS — EDITA ESTAS 3 LÍNEAS
// ══════════════════════════════════════════════════════════════════════════════
let CFG = {
  SHEET_ID:        localStorage.getItem('seafi_sheet_id')        || '',
  API_KEY:         localStorage.getItem('seafi_api_key')         || '',
  APPS_SCRIPT_URL: localStorage.getItem('seafi_apps_script_url') || '',
};
// ══════════════════════════════════════════════════════════════════════════════

const HOY        = new Date('2026-06-22');
const INICIO     = new Date('2026-06-01');
const FIN        = new Date('2026-12-18');
const DIAS_TOT   = Math.round((FIN-INICIO)/86400000);
const DIAS_TRANS = Math.round((HOY-INICIO)/86400000);
const DIAS_REST  = Math.round((FIN-HOY)/86400000);
const AV_CAL     = Math.round(DIAS_TRANS/DIAS_TOT*100);

const HOJAS = {
  eventos:'AGENDA_EVENTOS', hallazgos:'HALLAZGOS',
  documentos:'DOCUMENTOS',  acciones:'ACCIONES',
  actores:'ACTORES',         componentes:'COMPONENTES',
  entregables:'ENTREGABLES'
};

const COMP_BASE=[
  {id:1,nombre:'Manual de Organización',color:'#7B1D2E',acts:8},
  {id:2,nombre:'Procedimientos',color:'#9B4D1F',acts:12},
  {id:3,nombre:'Expedientes de Contratación',color:'#1A5276',acts:10},
  {id:4,nombre:'Base Tributaria',color:'#1D6A4A',acts:9},
  {id:5,nombre:'Capacidades Institucionales',color:'#6C3483',acts:11},
];
const ENT_BASE=[
  {id:1,nombre:'Diagnóstico e inicio de trabajos',comps:[1,2,3,4,5],fecha:'Por determinar'},
  {id:2,nombre:'Arranque formal de procedimientos, expedientes, datos y capacidades',comps:[2,3,4,5],fecha:'Por determinar'},
  {id:3,nombre:'Avance del Manual, procedimientos, expedientes y diagnóstico organizacional',comps:[1,2,3,5],fecha:'Por determinar'},
  {id:4,nombre:'Cierre del Manual y avance en procedimientos, expedientes, datos y capacidades',comps:[1,2,3,4,5],fecha:'Por determinar'},
  {id:5,nombre:'Cierre de expedientes y avance en datos y fortalecimiento',comps:[2,3,4,5],fecha:'Por determinar'},
  {id:6,nombre:'Cierre de procedimientos, explotación de datos y Programa de Fortalecimiento',comps:[2,4,5],fecha:'Por determinar'},
  {id:7,nombre:'Informe Final Integral del Servicio',comps:[1,2,3,4,5],fecha:'2026-12-18'},
];
const TIPOS_EVENTO=['Reunión presencial','Reunión virtual','Llamada','WhatsApp','Correo electrónico','Oficio','Entrega documental','Solicitud del cliente','Observación del cliente','Validación','Acuerdo','Compromiso','Visita a instalaciones','Presentación de resultados','Incidente','Riesgo detectado','Hito contractual'];
const TIPOS_HALL=['Brecha normativa','Vacío funcional','Duplicidad funcional','Inconsistencia documental','Falta documental','Cuello de botella','Actividad sin valor agregado','Riesgo de control interno','Riesgo de cumplimiento','Riesgo de fiscalización','Discrepancia de datos','Patrón de omisión','Subdeclaración potencial','Segmento tributario con oportunidad','Carga de trabajo desequilibrada','Función estratégica sin cobertura','Problema de coordinación SEAFI–SAFIN','Riesgo de continuidad operativa','Oportunidad de mejora'];
const TIPOS_DOC=['Manual de Organización','Procedimiento','Expediente de Contratación','Base de Datos','Fuente Pública','Fuente Institucional','Oficio','Correo','Minuta','Presentación','Reporte','Anexo','Evidencia de Reunión','Evidencia de Validación','Observación del Cliente','Versión de Trabajo','Entregable Final','Instrumento de Levantamiento'];
const SEVERIDADES=['Crítica','Alta','Media','Baja'];
const ESTADOS_H=['Abierto','En atención','En revisión','Cerrado'];
const ESTADOS_A=['Pendiente','En proceso','En revisión','Bloqueado','Concluido'];
const MEDIOS=['Presencial','Virtual','Telefónico','Correo','WhatsApp','Oficio','Plataforma'];
const FASES=['Planeación y coordinación institucional','Revisión documental','Levantamiento de información','Entrevistas y grupos focales','Diagnóstico','Análisis técnico','Identificación de brechas','Elaboración de propuestas','Validación con áreas','Incorporación de observaciones','Integración de entregables','Presentación de resultados','Seguimiento de recomendaciones','Cierre y consolidación final'];
const COL_SEV={'Crítica':'#8E1020','Alta':'#C0392B','Media':'#E67E22','Baja':'#27AE60'};
const COL_EST_A={'Pendiente':'#888','En proceso':'var(--naranja)','En revisión':'var(--azul)','Bloqueado':'var(--rojo)','Concluido':'#27AE60'};

// ══════════════════════════════════════════════════════════════════════════════
// STORAGE LOCAL
// ══════════════════════════════════════════════════════════════════════════════
const SK='seafi2026_v3';
let DB={
  eventos:[],hallazgos:[],documentos:[],acciones:[],actores:[],
  componentes:COMP_BASE.map(c=>({...c,avance:0,estado:'No iniciado',riesgo:'Bajo',responsable_interno:'',responsable_cliente:'',observaciones:''})),
  entregables:ENT_BASE.map(e=>({...e,estado_elaboracion:'Pendiente',estado_revision:'Pendiente',estado_envio:'Pendiente',estado_validacion:'Pendiente',avance:0,version:'—',responsable:'',observaciones:''}))
};
function saveLocal(){localStorage.setItem(SK,JSON.stringify(DB))}
function loadLocal(){
  try{
    const d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);DB={...DB,...p};}
  }catch(e){}
}
function uid(p){return p+'-'+Date.now()+'-'+Math.floor(Math.random()*1000)}

// ══════════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS — LECTURA Y ESCRITURA
// ══════════════════════════════════════════════════════════════════════════════
let sheetConectado = false;

// Lee una hoja completa del Sheet y devuelve array de objetos
async function leerHoja(nombreHoja) {
  if(!CFG.SHEET_ID || !CFG.API_KEY) return [];
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/${nombreHoja}?key=${CFG.API_KEY}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(!data.values || data.values.length < 2) return [];
    const [headers, ...rows] = data.values;
    return rows.map(row => Object.fromEntries(headers.map((h,i) => [h, row[i]||''])));
  } catch(e) {
    console.warn('leerHoja error:', e.message);
    return null; // null = error de conexión
  }
}

// Escribe una fila nueva en el Sheet via Apps Script
async function escribirFila(nombreHoja, datos) {
  if(!CFG.APPS_SCRIPT_URL) return false;
  try {
    // no-cors: el navegador no puede leer la respuesta pero los datos SÍ llegan al Sheet
    await fetch(CFG.APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({hoja: nombreHoja, datos}),
    });
    return true;
  } catch(e) {
    console.warn('escribirFila error:', e.message);
    return false;
  }
}

// Sincroniza TODAS las hojas del Sheet hacia el dashboard
async function syncSheet() {
  if(!CFG.SHEET_ID || !CFG.API_KEY) {
    toast('Configura el SHEET_ID y API_KEY en el módulo Configuración','warn');
    goTo('config'); return;
  }
  setSyncStatus('loading');
  toast('Sincronizando con Google Sheets...','');
  try {
    const [eventos, hallazgos, documentos, acciones, actores, componentes, entregables] = await Promise.all([
      leerHoja(HOJAS.eventos),
      leerHoja(HOJAS.hallazgos),
      leerHoja(HOJAS.documentos),
      leerHoja(HOJAS.acciones),
      leerHoja(HOJAS.actores),
      leerHoja(HOJAS.componentes),
      leerHoja(HOJAS.entregables),
    ]);

    // Si alguna hoja devuelve null hubo error de red
    if([eventos,hallazgos,documentos,acciones,actores].includes(null)) {
      setSyncStatus('error');
      toast('Error de conexión con Google Sheets. Verifica API Key y permisos.','error');
      return;
    }

    // Solo sobreescribe si hay datos en el Sheet
    if(eventos.length)     DB.eventos     = eventos;
    if(hallazgos.length)   DB.hallazgos   = hallazgos;
    if(documentos.length)  DB.documentos  = documentos;
    if(acciones.length)    DB.acciones    = acciones;
    if(actores.length)     DB.actores     = actores;
    // Componentes y entregables: mezcla — respeta avances del Sheet
    if(componentes && componentes.length) {
      DB.componentes = DB.componentes.map(c => {
        const sd = componentes.find(x => String(x.componente_id||x.id) === String(c.id));
        return sd ? {...c, ...sd, avance: Number(sd.avance||c.avance||0)} : c;
      });
    }
    if(entregables && entregables.length) {
      DB.entregables = DB.entregables.map(e => {
        const sd = entregables.find(x => String(x.entregable_id||x.numero||x.id) === String(e.id));
        return sd ? {...e, ...sd, avance: Number(sd.avance||e.avance||0)} : e;
      });
    }

    saveLocal();
    sheetConectado = true;
    setSyncStatus('ok');
    toast('✅ Sincronizado con Google Sheets — '+new Date().toLocaleTimeString('es-MX'),'success');
    render();
  } catch(e) {
    setSyncStatus('error');
    toast('Error inesperado: '+e.message,'error');
  }
}

function setSyncStatus(estado) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if(!dot || !label) return;
  if(estado==='ok')      { dot.className='sync-dot';     label.textContent='Sheet conectado'; }
  else if(estado==='error'){ dot.className='sync-dot err'; label.textContent='Error Sheet'; }
  else if(estado==='loading'){ dot.className='sync-dot off'; label.textContent='Sincronizando...'; }
  else                   { dot.className='sync-dot off'; label.textContent='Sin Sheet'; }
}

// Guarda localmente Y envía al Sheet si está configurado
async function save(hoja, datos) {
  saveLocal();
  if(!CFG.APPS_SCRIPT_URL) return; // Sin Apps Script, solo local
  const ok = await escribirFila(hoja, datos);
  if(ok) {
    setSyncStatus('ok');
  } else {
    toast('Guardado local ✓ — No se pudo escribir en Sheet (verifica Apps Script URL)','warn');
    setSyncStatus('error');
  }
}

async function probarConexion() {

  if(!CFG.SHEET_ID || !CFG.API_KEY) {
    res.textContent = '❌ Faltan SHEET_ID o API_KEY. Completa los campos.';
    res.style.color = 'var(--rojo)'; return;
  }
  const datos = await leerHoja('AGENDA_EVENTOS');
  if(datos === null) {
    res.innerHTML = '❌ Error de lectura. Verifica:<br>• Que el SHEET_ID sea correcto<br>• Que la API Key esté activa y sin restricciones de dominio<br>• Que la hoja se llame exactamente AGENDA_EVENTOS<br>• Que el Sheet sea público o compartido con la API Key';
    res.style.color = 'var(--rojo)'; return;
  }

  // Prueba escritura (Apps Script)
  if(!CFG.APPS_SCRIPT_URL) {
    res.innerHTML = '✅ Lectura OK ('+datos.length+' filas en AGENDA_EVENTOS)<br>⚠️ Apps Script URL no configurada — la escritura no funcionará hasta que la configures.';
    res.style.color = 'var(--naranja)'; return;
  }
  await escribirFila('_TEST_', {test:'ping', fecha: new Date().toISOString()});
  res.innerHTML = '✅ Lectura OK · ✅ Escritura enviada<br>Revisa tu Google Sheet — debe aparecer una fila en la hoja _TEST_.<br>Si aparece: todo funciona. Registra un evento de prueba en Cronología.';
  res.style.color = 'var(--verde)';
  setSyncStatus('ok');
}

let briefTexto='';let briefLoading=false;
function modBrief(){
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">

      <button class="btn btn-primary" onclick="generarBrief()" ${briefLoading?'disabled':''}>${briefLoading?'⏳ Generando...':'⚡ Generar Brief'}</button>
    </div>

  </div>`;

async function generarBrief(){
  briefLoading=true;render();
  const avG=DB.componentes.length?Math.round(DB.componentes.reduce((s,c)=>s+Number(c.avance||0),0)/DB.componentes.length):0;
  const hCrit=DB.hallazgos.filter(h=>h.severidad==='Crítica'||h.severidad==='Alta');
  const ctx=`Eres el sistema de inteligencia ejecutiva del Director de Consultoría del proyecto SEAFI Campeche 2026.
Estado (${HOY.toLocaleDateString('es-MX',{dateStyle:'long'})}): Avance ${avG}% · Tiempo consumido ${AV_CAL}% · Días restantes ${DIAS_REST}
Hallazgos: ${DB.hallazgos.length} total · ${hCrit.length} críticos · ${DB.hallazgos.filter(h=>h.estado==='Abierto').length} abiertos
Documentos: ${DB.documentos.length} · Eventos: ${DB.eventos.length} · Acciones: ${DB.acciones.length}
${hCrit.length?'Críticos: '+hCrit.map(h=>h.titulo+' ('+h.severidad+')').join('; '):'Sin hallazgos críticos.'}
Genera Brief Ejecutivo: 1)Estado general 2)Avances 3)Riesgos críticos 4)Acciones urgentes 5)Decisiones requeridas 6)Mensaje para SEAFI. Tono ejecutivo. Max 380 palabras.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:ctx}]})});
    const data=await res.json();
    briefTexto=data.content?.find(b=>b.type==='text')?.text||'Error.';
  }catch{briefTexto='Error de conexión.';}
  briefLoading=false;render();
}
